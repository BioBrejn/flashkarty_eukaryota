<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashkarty – Chloroplast a mitochondrie | BioBrejn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2eb;
    --surface: #ffffff;
    --surface2: #edeae1;
    --text: #1a1a18;
    --text2: #5a5850;
    --text3: #9a9688;
    --accent: #2d5a3d;
    --accent-light: #e8f0ea;
    --danger: #8b3a2a;
    --danger-light: #f5ece9;
    --border: rgba(26,26,24,0.10);
    --border2: rgba(26,26,24,0.18);
    --radius: 16px;
    --radius-sm: 8px;
    --shadow-lg: 0 8px 32px rgba(26,26,24,0.13);
    --font: 'DM Sans', sans-serif;
    --font-display: 'DM Serif Display', serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    background: var(--accent);
    color: #fff;
    padding: 1.25rem 1.25rem 1rem;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }
  .header-logo {
    font-family: var(--font-display);
    font-size: 1.1rem;
    color: rgba(255,255,255,0.7);
  }
  .header-sep { color: rgba(255,255,255,0.3); }
  .header-title {
    font-family: var(--font-display);
    font-size: 1.1rem;
    color: #fff;
  }
  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .progress-track {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #fff;
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-label {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    min-width: 42px;
    text-align: right;
  }

  /* ── Category pills ── */
  .cat-wrap {
    padding: 0.875rem 1.25rem 0;
    display: flex;
    gap: 6px;
    flex-wrap: nowrap;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .cat-wrap::-webkit-scrollbar { display: none; }
  .cat-pill {
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .cat-pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── Main ── */
  .main {
    padding: 1rem 1.25rem 2rem;
    max-width: 560px;
    margin: 0 auto;
  }

  /* ── Card flip container ── */
  .scene {
    perspective: 1200px;
    margin: 0.75rem 0 1rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* The flipper wraps both faces; height is driven by the taller face */
  .card-flipper {
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    /* height matches the tallest face via the invisible spacer trick */
  }
  .card-flipper.flipped { transform: rotateY(180deg); }

  /* Both faces are stacked; front is visible, back hidden until flip */
  .card-face {
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: var(--surface);
    box-shadow: var(--shadow-lg);
    padding: 1.4rem 1.4rem 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }
  /* Front: normal flow */
  .card-front { }

  /* Back: absolutely positioned on top of front, invisible until flipped */
  .card-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    transform: rotateY(180deg);
    background: #fafaf7;
    /* allow back to scroll if very long */
    overflow-y: auto;
  }
  /* Front also needs backface hidden */
  .card-front {
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  .card-cat {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .card-question {
    font-family: var(--font-display);
    font-size: 1.1rem;
    line-height: 1.5;
    color: var(--text);
    text-align: center;
    padding: 0.5rem 0;
  }
  .card-answer {
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text);
    text-align: center;
    padding: 0.5rem 0;
  }
  .card-hint {
    font-size: 11px;
    color: var(--text3);
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    margin-top: 0.2rem;
  }
  .hint-icon {
    width: 14px;
    height: 14px;
    border: 1.5px solid var(--text3);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
  }

  /* ── Controls ── */
  .controls {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 8px;
    align-items: center;
  }
  .btn {
    padding: 12px 0;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    text-align: center;
  }
  .btn:active { transform: scale(0.97); }
  .btn-wrong { border-color: var(--danger-light); background: var(--danger-light); color: var(--danger); }
  .btn-wrong:active { background: #eedad6; }
  .btn-right { border-color: var(--accent-light); background: var(--accent-light); color: var(--accent); }
  .btn-right:active { background: #d8e8db; }
  .btn-flip {
    padding: 12px 16px;
    font-size: 18px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border2);
    background: var(--surface);
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-flip:active { transform: scale(0.95); }

  /* ── Stats ── */
  .stats {
    display: flex;
    margin-top: 1rem;
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1.5px solid var(--border);
  }
  .stat {
    flex: 1;
    padding: 8px 6px;
    text-align: center;
    background: var(--surface);
  }
  .stat + .stat { border-left: 1.5px solid var(--border); }
  .stat-val { font-size: 18px; font-weight: 600; line-height: 1.1; display: block; }
  .stat-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-top: 2px; }
  .stat-val.green { color: var(--accent); }
  .stat-val.red { color: var(--danger); }
  .stat-val.gray { color: var(--text2); }

  /* ── Done ── */
  .done-card {
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: var(--surface);
    box-shadow: var(--shadow-lg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin: 0.75rem 0 1rem;
    text-align: center;
    padding: 2.5rem 1.5rem;
  }
  .done-emoji { font-size: 2.5rem; }
  .done-title { font-family: var(--font-display); font-size: 1.3rem; color: var(--text); }
  .done-sub { font-size: 0.9rem; color: var(--text2); }
  .btn-restart {
    margin-top: 0.5rem;
    padding: 10px 24px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--accent);
    background: var(--accent);
    color: #fff;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-restart:hover { opacity: 0.88; }

  .swipe-hint {
    font-size: 11px;
    color: var(--text3);
    text-align: center;
    margin-top: 0.5rem;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="header-logo">BioBrejn</span>
    <span class="header-sep">›</span>
    <span class="header-title">Chloroplast a mitochondrie – Flashkarty</span>
  </div>
  <div class="progress-row">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-label" id="progressLabel">0 / 0</span>
  </div>
</div>

<div class="cat-wrap" id="catWrap"></div>

<div class="main">

  <div id="cardContainer">
    <div class="scene" id="scene" onclick="handleFlip()">
      <div class="card-flipper" id="cardFlipper">
        <div class="card-face card-front">
          <div class="card-cat" id="frontCat"></div>
          <div class="card-question" id="question"></div>
          <div class="card-hint"><span class="hint-icon">↕</span>Klepni pro odpověď</div>
        </div>
        <div class="card-face card-back">
          <div class="card-cat" id="backCat"></div>
          <div class="card-answer" id="answer"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-wrong" onclick="rate(false)">✕ Nevím</button>
      <button class="btn-flip" onclick="handleFlip()">⟳</button>
      <button class="btn btn-right" onclick="rate(true)">✓ Umím</button>
    </div>
  </div>

  <div id="doneContainer" style="display:none">
    <div class="done-card">
      <div class="done-emoji">🎉</div>
      <div class="done-title" id="doneTitle"></div>
      <div class="done-sub" id="doneSub"></div>
      <button class="btn-restart" onclick="restart()">Procvičit znovu</button>
    </div>
  </div>

  <div class="swipe-hint">Přejeď doleva = nevím &nbsp;·&nbsp; doprava = umím</div>

  <div class="stats">
    <div class="stat"><span class="stat-val green" id="statCorrect">0</span><span class="stat-lbl">Správně</span></div>
    <div class="stat"><span class="stat-val red" id="statWrong">0</span><span class="stat-lbl">Chyby</span></div>
    <div class="stat"><span class="stat-val gray" id="statRemain">0</span><span class="stat-lbl">Zbývá</span></div>
  </div>

</div>

<script>
const CARDS = [
  // Vývoj po LECA
  { cat: "Vývoj po LECA", q: "Co je 'nudná miliarda' a proč by ji biolog nudnou nenazval?", a: "Geologické období ~1 mld. let po vzniku eukaryot, kdy se eukaryota diverzifikovala a připravovala na kolonizaci planety – biologicky šlo o klíčové období." },
  { cat: "Vývoj po LECA", q: "Čím se živili potomci LECA po svém vzniku?", a: "Především prokaryotními organismy – fagocytovali je, rozkládali ve fagozomech a vstřebávali živiny." },
  { cat: "Vývoj po LECA", q: "Kdy proběhla primární endosymbióza vedoucí ke vzniku chloroplastu?", a: "Přibližně před 1,5 miliardami let – eukaryotická buňka pohltila sinici a místo jejího strávení ji integrovala jako endosymbionta." },

  // Primární endosymbióza
  { cat: "Primární endosymbióza", q: "Co je primární endosymbióza?", a: "Pohlcení sinice eukaryotickou buňkou → vznik chloroplastu. Proběhla pouze jednou (+ jedna výjimka) i přes četné příležitosti." },
  { cat: "Primární endosymbióza", q: "Jaké jsou důkazy pro původ chloroplastu ze sinice?", a: "Chloroplast má ve stromatu DNA podobnou DNA sinic, vlastní prokaryotní ribozomy, dvě membrány a morfologickou podobnost se sinicemi." },
  { cat: "Primární endosymbióza", q: "Kolikrát proběhla primární endosymbióza?", a: "Pouze jednou – s jedinou známou výjimkou (Paulinella chromatophora), přestože příležitostí bylo jistě mnoho." },
  { cat: "Primární endosymbióza", q: "Jaká superskupina vznikla primární endosymbiózou?", a: "Archaeplastida – zahrnuje glaucofyty, ruduchy (Rhodophyta) a Chloroplastida (zelené řasy + suchozemské rostliny)." },
  { cat: "Primární endosymbióza", q: "Co je Paulinella chromatophora a proč je výjimečná?", a: "Améboidní řasa (Cercozoa/Rhizaria) se dvěma chloroplasty podobnými sinicím – jediný doložený případ nezávisle proběhlé primární endosymbiózy mimo Archaeplastida." },

  // Sekundární a terciální endosymbióza
  { cat: "Sekundární endosymbióza", q: "Co je sekundární endosymbióza?", a: "Eukaryot pohltil eukaryotní řasu (zelenou nebo červenou) a udržel její plastid → sekundární chloroplast s více membránami." },
  { cat: "Sekundární endosymbióza", q: "Proč mají sekundární chloroplasty více membrán než primární?", a: "Přibyly membrány z fagozómu hostitele a z buněčné membrány pohlcené řasy – výsledek je zpravidla 3–4 membrány místo dvou." },
  { cat: "Sekundární endosymbióza", q: "Co je nukleomorf?", a: "Zbytková DNA jádra původní eukaryotní řasy, zachovaná u některých skupin se sekundárním chloroplastem vedle chloroplastové DNA." },
  { cat: "Sekundární endosymbióza", q: "Co jsou kleptoplastidy?", a: "Skutečně 'ukradené' plastidy – organismus si dočasně přisvojí chloroplast jiného organismu, aniž by ho plně integroval jako svůj." },
  { cat: "Sekundární endosymbióza", q: "Co je terciální endosymbióza?", a: "Eukaryot pohltil eukaryota, který sám vznikl sekundární endosymbiózou → další vrstva membrán a DNA." },
  { cat: "Sekundární endosymbióza", q: "Co je apikoplast a kde se vyskytuje?", a: "Nefotosyntetizující organela u původce malárie (Plasmodium) – zbytek po sekundárním plastidu, který ztratil fotosyntézu." },

  // MRO – přeměněné mitochondrie
  { cat: "MRO", q: "Co jsou MRO (Mitochondrion-Related Organelles)?", a: "Přeměněné mitochondrie u anaerobních eukaryot (symbionté, parazité, organismy z močálů), které se adaptovaly na prostředí bez kyslíku." },
  { cat: "MRO", q: "Proč mají anaerobní eukaryota problém s mitochondriemi?", a: "Mitochondrie potřebují kyslík jako finální akceptor protonů v dýchacím řetězci – bez O₂ se řetězec zastaví." },
  { cat: "MRO", q: "Co je hydrogenozom?", a: "MRO se dvěma membránami, ribozomy a zpravidla DNA; vyrábí ATP v anaerobních podmínkách oxidací pyruvátu za vzniku H₂ a CO₂." },
  { cat: "MRO", q: "Co jsou HLO (Hydrogenosome-Like Organelles)?", a: "Ještě více redukované organely než hydrogenozomy – postrádají ribozomy i DNA." },
  { cat: "MRO", q: "Co je Nyctotherus ovalis a proč je zajímavý?", a: "Prvok (Ciliata) žijící ve střevech švábů, kde jim pomáhá trávit celulózu; jeho hydrogenozom výjimečně obsahuje DNA ukazující na původ z mitochondrie." },
  { cat: "MRO", q: "Co je mitozom?", a: "Nejvíce redukovaná MRO – bez DNA, bez krist, nevyrábí ATP; zachovává tvorbu Fe-S klastrů (železosirných klastrů); energie musí být dodávána z cytoplazmy přes ADP/ATP přenašeč." },
  { cat: "MRO", q: "U jakých organismů se vyskytuje mitozom?", a: "U Entamoeba histolytica, Giardia intestinalis, mikrosporidií (Trachipleistophora hominis, Encephalitozoon cuniculi) – vnitrobuněční parazité nebo anaerobi." },
  { cat: "MRO", q: "Jak se mitozom liší od hydrogenozomu?", a: "Mitozom nevyrábí ATP vůbec (hydrogenozom ano), nemá DNA ani ribozomy, je silněji redukován; sdílí jen tvorbu Fe-S klastrů a dvojitou membránu." },

  // Eukaryotický strom
  { cat: "Eukaryotický strom", q: "Kolik protistních druhů je dnes popsáno?", a: "Něco přes 100 tisíc – pravděpodobně jen zlomek skutečné protistní diverzity." },
  { cat: "Eukaryotický strom", q: "Jaká dvě hlavní kritéria se dnes používají pro stavbu eukaryotického stromu?", a: "1) Morfologie (mikroskop, elektronový mikroskop, metabolismus). 2) Molekulární srovnávání (DNA, proteiny, celé genomy)." },
  { cat: "Eukaryotický strom", q: "Jaký příklad překvapivé změny stromu přineslo molekulární srovnávání?", a: "Ptačí dravci – molekulární analýzy ukázaly, že jde o dvě nepříbuzné skupiny: jedna je blízká sovám, druhá papouškům." },
  { cat: "Eukaryotický strom", q: "Proč není vhodné učit se aktuální strom eukaryot do detailu nazpaměť?", a: "Každou chvíli se osekvenuje nový organismus, což vede k přerovnávání větví, rozpadu nebo vzniku nových superskupin – strom se neustále mění." },
  { cat: "Eukaryotický strom", q: "Ve které superskupině najdeme fotosyntetizující zástupce téměř všude?", a: "Fotosyntéza se díky sekundární (a terciální) endosymbióze rozšířila do mnoha superskupin – není výlučným znakem žádné jediné skupiny." },
];

let deck = [], idx = 0, correct = 0, wrong = 0;
let rated = new Set(), isFlipped = false, currentCat = "Vše";

function getCats() {
  return ["Vše", ...new Set(CARDS.map(c => c.cat))];
}

function buildCats() {
  const wrap = document.getElementById('catWrap');
  wrap.innerHTML = '';
  getCats().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-pill' + (cat === currentCat ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { currentCat = cat; resetSession(); buildCats(); };
    wrap.appendChild(btn);
  });
}

function resetSession() {
  correct = 0; wrong = 0; rated.clear(); isFlipped = false;
  deck = currentCat === "Vše" ? [...CARDS] : CARDS.filter(c => c.cat === currentCat);
  shuffle(deck);
  idx = 0;
  document.getElementById('cardFlipper').classList.remove('flipped');
  document.getElementById('cardContainer').style.display = '';
  document.getElementById('doneContainer').style.display = 'none';
  showCard();
  updateStats();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function showCard() {
  if (!deck.length) return;
  const c = deck[idx];
  document.getElementById('question').textContent = c.q;
  document.getElementById('answer').textContent = c.a;
  document.getElementById('frontCat').textContent = c.cat;
  document.getElementById('backCat').textContent = c.cat;
  // Reset flip state visually
  document.getElementById('cardFlipper').classList.remove('flipped');
  isFlipped = false;
  const done = rated.size, total = deck.length;
  document.getElementById('progressFill').style.width = (done / total * 100) + '%';
  document.getElementById('progressLabel').textContent = done + ' / ' + total;
}

function handleFlip() {
  isFlipped = !isFlipped;
  document.getElementById('cardFlipper').classList.toggle('flipped', isFlipped);
}

function rate(ok) {
  if (!isFlipped) { handleFlip(); return; }
  if (rated.has(idx)) { advance(); return; }
  rated.add(idx);
  if (ok) correct++; else wrong++;
  updateStats();
  if (rated.size >= deck.length) { showDone(); return; }
  advance();
}

function advance() {
  let next = (idx + 1) % deck.length, tries = 0;
  while (rated.has(next) && tries < deck.length) { next = (next + 1) % deck.length; tries++; }
  idx = next;
  showCard();
}

function showDone() {
  document.getElementById('cardContainer').style.display = 'none';
  document.getElementById('doneContainer').style.display = '';
  document.getElementById('doneTitle').textContent = correct + ' / ' + deck.length + ' správně';
  const pct = Math.round(correct / deck.length * 100);
  document.getElementById('doneSub').textContent = pct >= 80 ? 'Výborně! Látku ovládáš.' : pct >= 50 ? 'Dobrý základ, zkus to znovu.' : 'Procvič ještě jednou.';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = deck.length + ' / ' + deck.length;
}

function restart() { resetSession(); }

function updateStats() {
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statRemain').textContent = deck.length - rated.size;
}

// Swipe
let tx = 0, ty = 0;
const scene = document.getElementById('scene');
scene.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive: true });
scene.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (!isFlipped) { handleFlip(); return; }
    if (dx < 0) rate(false); else rate(true);
  }
}, { passive: true });

buildCats();
resetSession();
</script>
</body>
</html>
