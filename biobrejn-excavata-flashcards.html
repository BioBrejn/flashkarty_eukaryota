<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashkarty – Excavata | BioBrejn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2eb;
    --surface: #ffffff;
    --text: #1a1a18;
    --text2: #5a5850;
    --text3: #9a9688;
    --accent: #2d5a3d;
    --accent-light: #e8f0ea;
    --danger: #8b3a2a;
    --danger-light: #f5ece9;
    --border: rgba(26,26,24,0.10);
    --border2: rgba(26,26,24,0.18);
    --radius: 16px;
    --radius-sm: 8px;
    --shadow-lg: 0 8px 32px rgba(26,26,24,0.13);
    --font: 'DM Sans', sans-serif;
    --font-display: 'DM Serif Display', serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    background: var(--accent);
    color: #fff;
    padding: 1.25rem 1.25rem 1rem;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }
  .header-logo { font-family: var(--font-display); font-size: 1.1rem; color: rgba(255,255,255,0.7); }
  .header-sep { color: rgba(255,255,255,0.3); }
  .header-title { font-family: var(--font-display); font-size: 1.1rem; color: #fff; }
  .progress-row { display: flex; align-items: center; gap: 10px; }
  .progress-track { flex: 1; height: 3px; background: rgba(255,255,255,0.25); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: #fff; border-radius: 2px; transition: width 0.4s ease; width: 0%; }
  .progress-label { font-size: 12px; color: rgba(255,255,255,0.75); min-width: 42px; text-align: right; }

  /* ── Category pills ── */
  .cat-wrap {
    padding: 0.875rem 1.25rem 0;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .cat-wrap::-webkit-scrollbar { display: none; }
  .cat-pill {
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .cat-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Main ── */
  .main {
    padding: 1rem 1.25rem 2rem;
    max-width: 560px;
    margin: 0 auto;
  }

  /* ── Card – single face, auto height ── */
  .card {
    width: 100%;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: var(--surface);
    box-shadow: var(--shadow-lg);
    padding: 1.4rem 1.4rem 1.2rem;
    margin: 0.75rem 0 1rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .card.is-answer { background: #fafaf7; }

  .card-cat {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }

  .card-content { transition: opacity 0.15s ease; }
  .card-content.fading { opacity: 0; }

  .card-question {
    font-family: var(--font-display);
    font-size: 1.1rem;
    line-height: 1.55;
    color: var(--text);
    text-align: center;
    padding: 0.4rem 0 0.8rem;
  }
  .card-answer {
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text);
    text-align: center;
    padding: 0.4rem 0 0.4rem;
  }
  .card-hint {
    font-size: 11px;
    color: var(--text3);
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    margin-top: 0.6rem;
  }
  .hint-icon {
    width: 14px; height: 14px;
    border: 1.5px solid var(--text3);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
  }

  /* ── Controls ── */
  .controls {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 8px;
    align-items: center;
  }
  .btn {
    padding: 12px 0;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    text-align: center;
  }
  .btn:active { transform: scale(0.97); }
  .btn-wrong { border-color: var(--danger-light); background: var(--danger-light); color: var(--danger); }
  .btn-right { border-color: var(--accent-light); background: var(--accent-light); color: var(--accent); }
  .btn-flip {
    padding: 12px 16px; font-size: 18px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border2);
    background: var(--surface);
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-flip:active { transform: scale(0.95); }

  /* ── Stats ── */
  .stats {
    display: flex;
    margin-top: 1rem;
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1.5px solid var(--border);
  }
  .stat { flex: 1; padding: 8px 6px; text-align: center; background: var(--surface); }
  .stat + .stat { border-left: 1.5px solid var(--border); }
  .stat-val { font-size: 18px; font-weight: 600; line-height: 1.1; display: block; }
  .stat-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-top: 2px; }
  .stat-val.green { color: var(--accent); }
  .stat-val.red { color: var(--danger); }
  .stat-val.gray { color: var(--text2); }

  /* ── Done ── */
  .done-card {
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: var(--surface);
    box-shadow: var(--shadow-lg);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    margin: 0.75rem 0 1rem;
    text-align: center;
    padding: 2.5rem 1.5rem;
  }
  .done-emoji { font-size: 2.5rem; }
  .done-title { font-family: var(--font-display); font-size: 1.3rem; }
  .done-sub { font-size: 0.9rem; color: var(--text2); }
  .btn-restart {
    margin-top: 0.5rem; padding: 10px 24px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--accent);
    background: var(--accent); color: #fff;
    font-family: var(--font); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn-restart:hover { opacity: 0.88; }

  .swipe-hint { font-size: 11px; color: var(--text3); text-align: center; margin-top: 0.5rem; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="header-logo">BioBrejn</span>
    <span class="header-sep">›</span>
    <span class="header-title">Excavata – Flashkarty</span>
  </div>
  <div class="progress-row">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-label" id="progressLabel">0 / 0</span>
  </div>
</div>

<div class="cat-wrap" id="catWrap"></div>

<div class="main">

  <div id="cardContainer">
    <div class="card" id="card" onclick="handleFlip()">
      <div class="card-cat" id="cardCat"></div>
      <div class="card-content" id="cardContent">
        <div class="card-question" id="question"></div>
        <div class="card-hint"><span class="hint-icon">↕</span>Klepni pro odpověď</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-wrong" onclick="rate(false)">✕ Nevím</button>
      <button class="btn-flip" onclick="handleFlip()">⟳</button>
      <button class="btn btn-right" onclick="rate(true)">✓ Umím</button>
    </div>
  </div>

  <div id="doneContainer" style="display:none">
    <div class="done-card">
      <div class="done-emoji">🎉</div>
      <div class="done-title" id="doneTitle"></div>
      <div class="done-sub" id="doneSub"></div>
      <button class="btn-restart" onclick="restart()">Procvičit znovu</button>
    </div>
  </div>

  <div class="swipe-hint">Přejeď doleva = nevím &nbsp;·&nbsp; doprava = umím</div>

  <div class="stats">
    <div class="stat"><span class="stat-val green" id="statCorrect">0</span><span class="stat-lbl">Správně</span></div>
    <div class="stat"><span class="stat-val red" id="statWrong">0</span><span class="stat-lbl">Chyby</span></div>
    <div class="stat"><span class="stat-val gray" id="statRemain">0</span><span class="stat-lbl">Zbývá</span></div>
  </div>

</div>

<script>
const CARDS = [
  // Úvod – obecné znaky
  { cat: "Obecné znaky", q: "Podle čeho dostala skupina Excavata své jméno?", a: "Podle břišní (ventrální) rýhy mnoha zástupců, ve které kmitá zpětný bičík; latinské excavatio = dutina, vyhloubenina." },
  { cat: "Obecné znaky", q: "Proč je třeba dát pozor na starší učebnice při studiu Excavata?", a: "Dříve se tvrdilo, že nemají mitochondrie a jsou nejpůvodnější eukaryota. Ukázalo se, že je mají – jen silně zredukovaly na mitozomy nebo hydrogenozomy v souvislosti s parazitismem." },
  { cat: "Obecné znaky", q: "Jaký jediný znak spojuje celou skupinu Excavata?", a: "Molekulární fylogenetika – žádný morfologický znak není společný všem zástupcům." },
  { cat: "Obecné znaky", q: "Jaká je typická stavba excavátní buňky?", a: "Heterotrofní buňka s alespoň dvěma bičíky; zpětný bičík probíhá excavátní rýhou a přihání potravu k buněčným ústům; bazální tělíska bičíků jsou spojena svazky mikrotubulů (kořínky)." },
  { cat: "Obecné znaky", q: "Co je undulující membrána a u koho se vyskytuje?", a: "Pohyblivá 'ploutvička' umožňující pohyb ve viskózním prostředí; bičík probíhá její hranou a rozvlňuje cytoplazmatickou membránu; typická pro parazitické excaváty (Trichomonas, Trypanosoma)." },

  // Giardia
  { cat: "Giardia intestinalis", q: "Čím je Giardia intestinalis charakteristická morfologicky?", a: "Dvě jádra, osm bičíků, přísavný disk na spodní straně; postrádá klasické mitochondrie (má mitozomy); tvar připomíná dětský drak s jádry jako 'očima'." },
  { cat: "Giardia intestinalis", q: "Jak Giardia přijímá živiny, když nemá buněčná ústa?", a: "Pinocytózou – nasává tekutinu s živinami přes cytoplazmatickou membránu." },
  { cat: "Giardia intestinalis", q: "Jak se člověk nakazí giardií a jak probíhá infekce?", a: "Pozřením cyst s neomytou zeleninou nebo kontaminovanou vodou; v žaludku se aktivují na trofozoity, přisají se adhezivním diskem na enterocyty dvanáctníku (kobercový parazit) a narušují vstřebávání živin." },
  { cat: "Giardia intestinalis", q: "Jak se jmenuje onemocnění způsobené Giardií a jaké má příznaky?", a: "Giardióza – trávicí problémy, průjmy, bolesti břicha; cysty opouštějí tělo stolicí." },

  // Mixotricha
  { cat: "Mixotricha paradoxa", q: "Kde žije Mixotricha paradoxa a jaká je její ekologická role?", a: "V trávicím systému australských termitů; pomáhá štěpit celulózu a lignin – ale samotné štěpení zajišťují symbiotické bakterie uvnitř buňky." },
  { cat: "Mixotricha paradoxa", q: "Jak se Mixotricha pohybuje a proč je to překvapivé?", a: "Pohyb zajišťují tisíce synchronizovaných spirochet (gramnegativních bakterií) na povrchu buňky; čtyři vlastní bičíky slouží pouze ke kormidlování." },
  { cat: "Mixotricha paradoxa", q: "Co je na Mixotricha paradoxa výjimečné z hlediska organel?", a: "Obsahuje současně hydrogenozomy i mitozomy – dva různé typy MRO v jedné buňce. Měří až 0,5 mm, jde o obří jednobuněčný organismus." },
  { cat: "Mixotricha paradoxa", q: "Kolik různých symbiontů hostí Mixotricha paradoxa?", a: "Minimálně dva typy ektosymbiontů na povrchu (spirochety zajišťující pohyb + další bakterie) a endosymbiotické bakterie uvnitř buňky štěpící celulózu." },

  // Trichomonas
  { cat: "Trichomonas vaginalis", q: "Kde žije Trichomonas vaginalis a jak se přenáší?", a: "V pohlavních cestách mužů i žen; přenos pohlavním stykem – člověk je jediný hostitel. Přibližně polovina nakažených je bez příznaků." },
  { cat: "Trichomonas vaginalis", q: "Jaká je morfologie Trichomonas vaginalis?", a: "Čtyři volné bičíky + jeden bičík tvořící undulující membránu, výrazný axostyl, velké množství hydrogenozomů v cytoplazmě, parabazální aparát (Golgi propojený s jádrem)." },
  { cat: "Trichomonas vaginalis", q: "Jak Trichomonas poškozuje mikrobiom pochvy?", a: "Konzumuje bakterie vaginálního mikrobiomu, tím narušuje kyselé prostředí pochvy a otevírá cestu dalším patogenům (HIV, HPV – rakovina děložního čípku)." },
  { cat: "Trichomonas vaginalis", q: "Jak časté je onemocnění trichomonázou?", a: "Přibližně 160 milionů nových případů ročně (WHO); jde o nejčastější parazitární onemocnění ve 'vyspělém světě', lze mu předejít kondomem." },

  // Krásnoočka
  { cat: "Krásnoočka (Euglenozoa)", q: "Proč jsou krásnoočka z didaktického hlediska oblíbená?", a: "Dají se snadno najít v každém návesním rybníčku a druh Euglena gracilis je modelovým organizmem." },
  { cat: "Krásnoočka (Euglenozoa)", q: "Proč zavedl Ernst Haeckel třetí říši Protista – a jakou roli v tom hrála krásnoočka?", a: "Krásnoočka jsou schopna jak autotrofní (fotosyntetické), tak heterotrofní výživy – nezapadají ani mezi živočichy, ani mezi rostliny." },
  { cat: "Krásnoočka (Euglenozoa)", q: "Co je pelikula krásnooček a jak funguje?", a: "Spirálně uspořádané bílkoviny pod cytoplazmatickou membránou udržující tvar buňky (jiná než pelikula nálevníků)." },
  { cat: "Krásnoočka (Euglenozoa)", q: "Jak jsou stavěny bičíky krásnooček?", a: "Z ampule vyrůstají dva bičíky: krátký neopouští ampuli; dlouhý je opatřen mastigonemy (jemnými chloupky) a je dobře patrný v mikroskopu." },
  { cat: "Krásnoočka (Euglenozoa)", q: "Co je stigma u krásnooček a k čemu slouží?", a: "Červená světločivná skvrna fungující jako stínítko pro fotoreceptor; umožňuje buňce detekovat směr světla a optimalizovat polohu pro fotosyntézu." },
  { cat: "Krásnoočka (Euglenozoa)", q: "Kolik membrán mají chloroplasty krásnooček a proč?", a: "Tři membrány – jde o sekundární zelené chloroplasty (pohlcená zelená řasa)." },
  { cat: "Krásnoočka (Euglenozoa)", q: "Jak se krásnoočka rozmnožují?", a: "Nepohlavně podélným dělením, začínající od konce s bičíky." },

  // Trypanosoma
  { cat: "Trypanosoma", q: "Co je kinetoplast a kde se nachází?", a: "Síť kruhových DNA uvnitř velké mitochondrie trypanosomů; tvoří ji maxikruhy (kódují mitochondriální proteiny v zašifrované formě) a minikruhy (kódují gRNA pro dekódování maxikruhů)." },
  { cat: "Trypanosoma", q: "Jak trypanosomy unikají imunitnímu systému hostitele?", a: "Neustálou změnou povrchových proteinů (antigenů) – imunitní systém nestíhá vytvářet protilátky." },
  { cat: "Trypanosoma", q: "Jak probíhá přenos Trypanosoma brucei na člověka?", a: "Bodalka rodu Glossina (moucha tse-tse) přenáší trypanosomy ze slinných žláz při sání krve; trypanozoma osidluje mízní uzliny, poté krevní řečiště." },
  { cat: "Trypanosoma", q: "Jaké jsou příznaky spavé nemoci (Trypanosoma brucei)?", a: "1. fáze: horečka, bolesti hlavy a kloubů. 2. fáze: zmatenost, strnulost, poruchy spánku. Vyskytuje se v subsaharské Africe." },
  { cat: "Trypanosoma", q: "Co způsobuje Trypanosoma cruzi a jak se přenáší?", a: "Chagasovu chorobu v Jižní Americe; přenáší ji krvesající ploštice." },
  { cat: "Trypanosoma", q: "Co je Leishmania a jak se přenáší?", a: "Česky ničivka; parazit příbuzný trypanosomám, přenáší ho bodavý hmyz Phlebotomus; způsobuje leishmaniózu." },

  // Naegleria
  { cat: "Naegleria fowleri", q: "Kde žije Naegleria fowleri a jak způsobuje onemocnění?", a: "Volně žijící prvok v teplých vodách; výjimečně proniká přes nosní sliznici do mozku a způsobuje velmi rychlou a smrtelnou meningoencefalitidu." },
  { cat: "Naegleria fowleri", q: "Jaká je smrtnost naeglerie a proč je česky historicky proslulá?", a: "Ze 145 infikovaných (1962–2018) přežili pouze čtyři; v Ústí nad Labem zemřelo 1963–1965 šestnáct mladých lidí nakažených v plaveckém bazénu." },
];

let deck = [], idx = 0, correct = 0, wrong = 0;
let rated = new Set(), isFlipped = false, currentCat = "Vše";

function getCats() {
  return ["Vše", ...new Set(CARDS.map(c => c.cat))];
}

function buildCats() {
  const wrap = document.getElementById('catWrap');
  wrap.innerHTML = '';
  getCats().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-pill' + (cat === currentCat ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { currentCat = cat; resetSession(); buildCats(); };
    wrap.appendChild(btn);
  });
}

function resetSession() {
  correct = 0; wrong = 0; rated.clear(); isFlipped = false;
  deck = currentCat === "Vše" ? [...CARDS] : CARDS.filter(c => c.cat === currentCat);
  shuffle(deck);
  idx = 0;
  document.getElementById('cardContainer').style.display = '';
  document.getElementById('doneContainer').style.display = 'none';
  document.getElementById('card').classList.remove('is-answer');
  showCard();
  updateStats();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function showCard() {
  if (!deck.length) return;
  const c = deck[idx];
  document.getElementById('cardCat').textContent = c.cat;
  isFlipped = false;
  document.getElementById('card').classList.remove('is-answer');
  document.getElementById('cardContent').innerHTML =
    `<div class="card-question">${c.q}</div>
     <div class="card-hint"><span class="hint-icon">↕</span>Klepni pro odpověď</div>`;
  const done = rated.size, total = deck.length;
  document.getElementById('progressFill').style.width = (done / total * 100) + '%';
  document.getElementById('progressLabel').textContent = done + ' / ' + total;
}

function handleFlip() {
  if (isFlipped) return;
  isFlipped = true;
  const c = deck[idx];
  const content = document.getElementById('cardContent');
  content.classList.add('fading');
  setTimeout(() => {
    content.innerHTML = `<div class="card-answer">${c.a}</div>`;
    document.getElementById('card').classList.add('is-answer');
    content.classList.remove('fading');
  }, 150);
}

function rate(ok) {
  if (!isFlipped) { handleFlip(); return; }
  if (rated.has(idx)) { advance(); return; }
  rated.add(idx);
  if (ok) correct++; else wrong++;
  updateStats();
  if (rated.size >= deck.length) { showDone(); return; }
  advance();
}

function advance() {
  let next = (idx + 1) % deck.length, tries = 0;
  while (rated.has(next) && tries < deck.length) { next = (next + 1) % deck.length; tries++; }
  idx = next;
  showCard();
}

function showDone() {
  document.getElementById('cardContainer').style.display = 'none';
  document.getElementById('doneContainer').style.display = '';
  document.getElementById('doneTitle').textContent = correct + ' / ' + deck.length + ' správně';
  const pct = Math.round(correct / deck.length * 100);
  document.getElementById('doneSub').textContent = pct >= 80 ? 'Výborně! Látku ovládáš.' : pct >= 50 ? 'Dobrý základ, zkus to znovu.' : 'Procvič ještě jednou.';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = deck.length + ' / ' + deck.length;
}

function restart() { resetSession(); }

function updateStats() {
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statRemain').textContent = deck.length - rated.size;
}

// Swipe
let tx = 0, ty = 0;
const cardEl = document.getElementById('card');
cardEl.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive: true });
cardEl.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (!isFlipped) { handleFlip(); return; }
    if (dx < 0) rate(false); else rate(true);
  }
}, { passive: true });

buildCats();
resetSession();
</script>
</body>
</html>
